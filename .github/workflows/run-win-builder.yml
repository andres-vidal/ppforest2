name: 'Manual: win-builder'

# Upload the built source tarball to win-builder
# (https://win-builder.r-project.org) for R-devel and R-release checks — the
# exact Windows toolchain CRAN's incoming pre-test uses. Run this before a
# CRAN (re)submission to catch Windows / R-devel issues the normal CI
# (release R only) does not.
#
# win-builder is asynchronous: this workflow only uploads the tarball. The
# check results are emailed to the maintainer address in DESCRIPTION (~30 min
# later), not reported back here.
#
# We build the tarball with `make r-build` (which stages the C++ core via
# r-prepare) rather than letting devtools build it, so the tarball is complete.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  win-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: r-lib/actions/setup-r@v2
      - uses: r-lib/actions/setup-pandoc@v2
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: bindings/R
      - name: Build source tarball
        run: make r-build
      - name: Upload to win-builder (R-devel and R-release)
        run: |
          set -euo pipefail
          tarball=$(ls ppforest2_*.tar.gz | head -n1)
          echo "Uploading ${tarball} to win-builder..."
          curl --fail --silent --show-error -T "${tarball}" ftp://win-builder.r-project.org/R-devel/
          curl --fail --silent --show-error -T "${tarball}" ftp://win-builder.r-project.org/R-release/
          echo "Uploaded. R-devel and R-release results will be emailed to the"
          echo "maintainer address in DESCRIPTION in ~30 minutes."
