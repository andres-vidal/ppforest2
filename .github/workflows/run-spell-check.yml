name: Run Spell Check

# Spell-check DESCRIPTION, Rd files, vignettes and NEWS against the dictionary
# plus inst/WORDLIST (the accepted domain terms / proper nouns). Catches new
# typos before CRAN's incoming check flags them. To accept a new legitimate
# word, run `Rscript -e 'spelling::update_wordlist("bindings/R")'` and commit
# the updated inst/WORDLIST.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  spelling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install spelling
        run: Rscript -e 'install.packages("spelling", repos = "https://cloud.r-project.org")'
      - name: Stage package (copies CHANGELOG -> NEWS.md, etc.)
        run: make r-prepare
      - name: Spell check
        run: |
          Rscript -e 'r <- spelling::spell_check_package("bindings/R"); if (nrow(r) > 0) { print(r); quit(status = 1L) }'
